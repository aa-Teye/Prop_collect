<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PropCollect - Lower Manya Krobo Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #0a1628;
      color: white;
    }
    .loader-box { text-align: center; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #FCD116;
      border-radius: 50%;
      margin: 0 auto 16px;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { margin: 0; color: #FCD116; }
    p { color: rgba(255,255,255,0.7); font-size: 14px; }
  </style>
</head>
<body>
  <div class="loader-box">
    <div class="spinner"></div>
    <h2>PropCollect</h2>
    <p>Opening Lower Manya Krobo Dashboard...</p>
  </div>
  <script>
    window.location.replace('dashboard.html?district=' + encodeURIComponent('Lower Manya Krobo'));
  </script>
</body>
</html>
